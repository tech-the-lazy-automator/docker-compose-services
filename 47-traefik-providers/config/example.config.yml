http:
  routers:
    <service_name>:
      rule: "Host(`<service_name>.<subdomain>.<domain>`)"
      entryPoints:
        - "websecure"
      tls: {}
      service: <service_name>
      middlewares:
        - secured

  services:
    <service_name>:
      loadBalancer:
        servers:
          - url: "https://<ip-address>:<port>"
        passHostHeader: true

  middlewares:
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipAllowList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers